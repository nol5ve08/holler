<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외치기</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a1a;
    --text-primary: #ffffff;
    --text-muted: rgba(255,255,255,0.35);
    --text-dim: rgba(255,255,255,0.12);
    --text-idle: rgba(255,255,255,0.18);
    --error: #e04040;
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    position: relative;
  }

  /* ── Kebab ── */
  .kebab {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .kebab:hover { background: rgba(255,255,255,0.06); }
  .kebab span {
    display: block;
    width: 4px;
    height: 4px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: background 0.2s;
  }
  .kebab:hover span { background: var(--text-primary); }

  /* ── Main Display ── */
  .display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
  }

  .message {
    font-weight: 900;
    font-size: clamp(2rem, 7vw, 5.5rem);
    line-height: 1.25;
    text-align: center;
    max-width: 900px;
    letter-spacing: -0.02em;
    word-break: keep-all;
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .message.visible {
    opacity: 1;
    transform: scale(1);
  }
  .message.exit {
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 0.4s ease-in, transform 0.4s ease-in;
  }
  .message.idle {
    font-weight: 900;
    font-size: clamp(1.8rem, 5vw, 4rem);
    color: var(--text-idle);
  }

  /* ── Bottom ── */
  .bottom {
    padding: 0 20px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    height: 18px;
    transition: opacity 0.3s;
  }
  .status svg {
    width: 15px;
    height: 15px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .chat-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    color: var(--text-primary);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    padding: 10px 2px;
    padding-right: 32px;
    outline: none;
    transition: border-color 0.25s, color 0.2s;
  }
  .chat-input::placeholder {
    color: var(--text-muted);
    font-weight: 400;
  }
  .chat-input:focus {
    border-color: rgba(255,255,255,0.5);
  }
  .chat-input.error {
    color: var(--error);
    border-color: var(--error);
  }

  .clear-btn {
    display: none;
    position: absolute;
    right: 40px;
    background: none;
    border: none;
    color: var(--error);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }
  .clear-btn.show { display: block; }

  .send-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.3;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn.active { opacity: 1; }
  .send-btn:active { transform: scale(0.9); }
  .send-btn svg {
    width: 20px;
    height: 20px;
    fill: var(--text-primary);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-primary);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Connection status ── */
  .connection-dot {
    position: absolute;
    top: 24px;
    right: 20px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .connection-dot.connected { background: #4ade80; }
  .connection-dot.disconnected { background: #ef4444; }
</style>
</head>
<body>

<div class="app">
  <div class="kebab" id="kebab" title="메뉴">
    <span></span><span></span><span></span>
  </div>

  <div class="connection-dot" id="connectionDot" title="연결 상태"></div>

  <div class="display">
    <div class="message idle visible" id="message">조용하네요...</div>
  </div>

  <div class="bottom">
    <div class="status" id="status">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="statusText">메세지가 없어요</span>
    </div>
    <div class="input-row">
      <input
        type="text"
        class="chat-input"
        id="chatInput"
        placeholder="여기서 외쳐"
        maxlength="100"
        autocomplete="off"
      />
      <button class="clear-btn" id="clearBtn" title="지우기">×</button>
      <button class="send-btn" id="sendBtn" title="보내기">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const messageEl = document.getElementById('message');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusText = document.getElementById('statusText');
  const toast = document.getElementById('toast');
  const connectionDot = document.getElementById('connectionDot');

  const MAX_CHARS = 20;
  let ws = null;
  let myQueuePosition = -1;

  // ── WebSocket connection ──
  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.onopen = () => {
      connectionDot.className = 'connection-dot connected';
    };

    ws.onclose = () => {
      connectionDot.className = 'connection-dot disconnected';
      // Reconnect after 2 seconds
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      connectionDot.className = 'connection-dot disconnected';
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      switch (data.type) {
        case 'show':
          showMessage(data.text);
          break;

        case 'hide':
          hideMessage();
          break;

        case 'idle':
          showIdle();
          myQueuePosition = -1;
          updateStatus();
          break;

        case 'queue_position':
          myQueuePosition = data.position;
          updateStatus();
          break;

        case 'status':
          // Initial state when connecting
          if (!data.playing) showIdle();
          break;
      }
    };
  }

  // ── Input handling ──
  chatInput.addEventListener('input', () => {
    const text = chatInput.value;
    const overLimit = text.length > MAX_CHARS;
    chatInput.classList.toggle('error', overLimit);
    clearBtn.classList.toggle('show', overLimit);
    sendBtn.classList.toggle('active', text.trim().length > 0 && !overLimit);
  });

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) {
      e.preventDefault();
      submitMessage();
    }
  });

  sendBtn.addEventListener('click', submitMessage);

  clearBtn.addEventListener('click', () => {
    chatInput.value = '';
    chatInput.classList.remove('error');
    clearBtn.classList.remove('show');
    sendBtn.classList.remove('active');
    chatInput.focus();
  });

  function submitMessage() {
    const text = chatInput.value.trim();
    if (!text || text.length > MAX_CHARS) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showToast('연결 중이에요, 잠시만요');
      return;
    }

    ws.send(JSON.stringify({ type: 'submit', text }));
    chatInput.value = '';
    chatInput.classList.remove('error');
    clearBtn.classList.remove('show');
    sendBtn.classList.remove('active');
  }

  // ── Display ──
  function showMessage(text) {
    messageEl.className = 'message';
    messageEl.textContent = text;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        messageEl.classList.add('visible');
      });
    });
  }

  function hideMessage() {
    messageEl.classList.remove('visible');
    messageEl.classList.add('exit');
  }

  function showIdle() {
    messageEl.className = 'message idle';
    messageEl.textContent = '조용하네요...';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        messageEl.classList.add('visible');
      });
    });
  }

  // ── Status ──
  function updateStatus() {
    if (myQueuePosition > 0) {
      statusText.textContent = myQueuePosition + '번 째 뒤에 나옴';
    } else {
      statusText.textContent = '메세지가 없어요';
    }
  }

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Kebab ──
  document.getElementById('kebab').addEventListener('click', () => {
    showToast('메뉴는 추후 기획 예정');
  });

  // ── Init ──
  showIdle();
  updateStatus();
  connect();
</script>

</body>
</html>
